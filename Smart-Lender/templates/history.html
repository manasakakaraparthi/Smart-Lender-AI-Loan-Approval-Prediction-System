{% extends 'base.html' %}
{% block content %}
<h2>Prediction History</h2>
{% if df is not none %}
  <div class="table-responsive">
    <table class="table table-hover">
      <thead><tr>{% for c in df.columns %}<th>{{ c }}</th>{% endfor %}</tr></thead>
      <tbody>
      {% for _, row in df.iterrows() %}
        <tr>{% for c in df.columns %}<td>{{ row[c] }}</td>{% endfor %}</tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <p>No history yet.</p>
{% endif %}
{% endblock %}
